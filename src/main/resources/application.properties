spring.application.name=SAB
server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:api,worker}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sab}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

sab.scheduler.polling-interval-ms=1000
sab.scheduler.queue-prefix=sab:queue
sab.scheduler.weights.high=70
sab.scheduler.weights.normal=20
sab.scheduler.weights.low=10

sab.rate-limit.requests-per-minute=60
sab.rate-limit.window-seconds=60

sab.retry.max-attempts=3
sab.retry.initial-delay-seconds=5
sab.retry.backoff-multiplier=2.0
sab.retry.max-delay-seconds=300
sab.retry.jitter-percent=20

sab.worker.lease-timeout-seconds=30
sab.worker.retry-promoter-interval-ms=1000
sab.worker.lease-reaper-interval-ms=5000

sab.queue.max-depth=10000

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
management.tracing.enabled=true
management.tracing.sampling.probability=0.1
management.tracing.propagation.type=w3c
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

resilience4j.circuitbreaker.instances.externalHttpExecutor.sliding-window-size=20
resilience4j.circuitbreaker.instances.externalHttpExecutor.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.externalHttpExecutor.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.externalHttpExecutor.wait-duration-in-open-state=30s
resilience4j.bulkhead.instances.externalHttpExecutor.max-concurrent-calls=10
resilience4j.bulkhead.instances.externalHttpExecutor.max-wait-duration=0

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s

logging.level.com.learnerview.sab=INFO
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
spring.mvc.problemdetails.enabled=true