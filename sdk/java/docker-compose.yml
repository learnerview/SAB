services:
  postgres:
    image: postgres:15
    container_name: sab-postgres
    environment:
      POSTGRES_DB: sab
      POSTGRES_USER: sab
      POSTGRES_PASSWORD: sab
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sab"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7
    container_name: sab-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build: .
    container_name: sab-app
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sab
      SPRING_DATASOURCE_USERNAME: sab
      SPRING_DATASOURCE_PASSWORD: sab
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_SECURITY_ADMIN_USERNAME: admin
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local